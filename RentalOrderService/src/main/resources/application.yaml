spring:
  application:
    name: rentalOrderService
  microservice-users:
    url: http://localhost:8080/api/v1/users
  microservice-products:
    url: http://localhost:8082/api/v1/product-service
  datasource:
    url: jdbc:postgresql://127.0.0.1:5433/ordersdb
    username: ordersadmin
    password: orderspassword
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8081